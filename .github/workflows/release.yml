name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────────────────
  # Патч исходников
  # ─────────────────────────────────────────────────────────────────
  patch-sources:
    name: Patch sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch ip_to_peer_map.cpp (offsetof VLA)
        run: |
          sed -i \
            's/malloc(offsetof(RoutingTrie32::Node, child\[(uint32)(1U << bits)\]))/malloc(offsetof(RoutingTrie32::Node, child) + ((size_t)(1U << bits)) * sizeof(RoutingTrie32::Node*))/' \
            ip_to_peer_map.cpp
          grep -n "malloc(offsetof" ip_to_peer_map.cpp

      - name: Patch wireguard.cpp (PacketResultd typo)
        run: |
          sed -i 's/WireguardProcessor::PacketResultd/WireguardProcessor::PacketResult/g' wireguard.cpp
          echo "wireguard.cpp line 710: $(sed -n '710p' wireguard.cpp)"

      - name: Ensure CreateTunsafePlugin is defined
        run: |
          if ! grep -q 'CreateTunsafePlugin[^;]*{' tunsafe_wg_plugin.cpp; then
            echo "" >> tunsafe_wg_plugin.cpp
            echo '#include "tunsafe_wg_plugin.h"' >> tunsafe_wg_plugin.cpp
            echo '#include "wireguard.h"' >> tunsafe_wg_plugin.cpp
            echo 'TunsafePlugin *CreateTunsafePlugin(PluginDelegate *del, WireguardProcessor *wgp) { return nullptr; }' >> tunsafe_wg_plugin.cpp
            echo "Appended CreateTunsafePlugin stub"
          else
            echo "CreateTunsafePlugin already defined"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: patched-sources
          path: |
            ip_to_peer_map.cpp
            wireguard.cpp
            tunsafe_wg_plugin.cpp

  # ─────────────────────────────────────────────────────────────────
  # Linux x86_64
  # ─────────────────────────────────────────────────────────────────
  build-linux-x86_64:
    name: Linux x86_64 (static + ASM)
    runs-on: ubuntu-latest
    needs: patch-sources
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: patched-sources
      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y gcc g++ binutils
      - name: Build ASM objects
        run: |
          gcc -c -march=skylake-avx512 \
            crypto/poly1305/poly1305-x64-linux.s \
            crypto/chacha20/chacha20-x64-linux.s
      - name: Build TunSafe
        run: |
          g++ -I . -O3 -DNDEBUG \
            -DWITH_NETWORK_BSD=1 \
            -mssse3 -std=gnu++14 \
            -static -pthread \
            -o tunsafe-linux-x86_64 \
            tunsafe_amalgam.cpp \
            crypto/aesgcm/aesni_gcm-x64-linux.s \
            crypto/aesgcm/aesni-x64-linux.s \
            crypto/aesgcm/ghash-x64-linux.s \
            chacha20-x64-linux.o \
            poly1305-x64-linux.o \
            -lrt
          strip tunsafe-linux-x86_64
          file tunsafe-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: tunsafe-linux-x86_64
          path: tunsafe-linux-x86_64

  # ─────────────────────────────────────────────────────────────────
  # Linux i686
  # ─────────────────────────────────────────────────────────────────
  build-linux-i686:
    name: Linux i686 (static)
    runs-on: ubuntu-latest
    needs: patch-sources
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: patched-sources
      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y gcc-multilib g++-multilib
      - name: Build TunSafe
        run: |
          g++ -m32 -I . -O3 -DNDEBUG \
            -DWITH_NETWORK_BSD=1 \
            -DCHACHA20_WITH_ASM=0 -DBLAKE2S_WITH_ASM=0 \
            -mssse3 -std=gnu++14 \
            -static -pthread \
            -o tunsafe-linux-i686 \
            tunsafe_amalgam.cpp \
            -lrt
          strip tunsafe-linux-i686
          file tunsafe-linux-i686
      - uses: actions/upload-artifact@v4
        with:
          name: tunsafe-linux-i686
          path: tunsafe-linux-i686

  # ─────────────────────────────────────────────────────────────────
  # Linux ARMv7
  # ─────────────────────────────────────────────────────────────────
  build-linux-armv7:
    name: Linux ARMv7 (static)
    runs-on: ubuntu-latest
    needs: patch-sources
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: patched-sources
      - name: Install cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
      - name: Build TunSafe
        run: |
          arm-linux-gnueabihf-g++ \
            -I . -O2 -DNDEBUG \
            -DWITH_NETWORK_BSD=1 \
            -DCHACHA20_WITH_ASM=0 -DBLAKE2S_WITH_ASM=0 \
            -mfpu=neon -march=armv7-a \
            -std=gnu++14 -static -pthread \
            -o tunsafe-linux-armv7 \
            tunsafe_amalgam.cpp -lrt
          arm-linux-gnueabihf-strip tunsafe-linux-armv7
          file tunsafe-linux-armv7
      - uses: actions/upload-artifact@v4
        with:
          name: tunsafe-linux-armv7
          path: tunsafe-linux-armv7

  # ─────────────────────────────────────────────────────────────────
  # Linux AArch64
  # ─────────────────────────────────────────────────────────────────
  build-linux-aarch64:
    name: Linux AArch64/ARMv8 (static)
    runs-on: ubuntu-latest
    needs: patch-sources
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: patched-sources
      - name: Install cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - name: Build TunSafe
        run: |
          aarch64-linux-gnu-g++ \
            -I . -O2 -DNDEBUG \
            -DWITH_NETWORK_BSD=1 \
            -DCHACHA20_WITH_ASM=0 -DBLAKE2S_WITH_ASM=0 \
            -std=gnu++14 -static -pthread \
            -o tunsafe-linux-aarch64 \
            tunsafe_amalgam.cpp -lrt
          aarch64-linux-gnu-strip tunsafe-linux-aarch64
          file tunsafe-linux-aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: tunsafe-linux-aarch64
          path: tunsafe-linux-aarch64

  # ─────────────────────────────────────────────────────────────────
  # Windows MSVC
  # ─────────────────────────────────────────────────────────────────
  build-windows-msvc:
    name: Windows MSVC x64 (GUI)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Install NASM and fix ASM sources
        shell: pwsh
        run: |
          choco install nasm --no-progress -y
          $nasm = Get-ChildItem "C:\Program Files\NASM","C:\NASM" -Filter nasm.exe -Recurse -ErrorAction SilentlyContinue |
                  Select-Object -First 1 -ExpandProperty FullName
          if (-not $nasm) {
            $nasm = Get-ChildItem "C:\ProgramData\chocolatey" -Filter nasm.exe -Recurse -ErrorAction SilentlyContinue |
                    Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Host "Found NASM at: $nasm"
          New-Item -ItemType Directory -Force "C:\dev\nasm" | Out-Null
          Copy-Item $nasm "C:\dev\nasm\nasm.exe"
          Write-Host "NASM version: $(& 'C:\dev\nasm\nasm.exe' -v)"
          $f = "crypto\curve25519\curve25519-x64-win.asm"
          (Get-Content $f) -replace '^#\s*(.*)', '; $1' | Set-Content $f
          (Get-Content util_win32.cpp) -replace 'if \(!f\) return false;', 'if (!f) return NULL;' |
            Set-Content util_win32.cpp
          (Get-Content wireguard.cpp) -replace 'PacketResultd', 'PacketResult' |
            Set-Content wireguard.cpp
          $pg = Get-Content tunsafe_wg_plugin.cpp -First 1
          if ($pg -notmatch 'stdafx') {
            $lines = Get-Content tunsafe_wg_plugin.cpp
            '#include "stdafx.h"', '' + $lines | Set-Content tunsafe_wg_plugin.cpp
          }
          $wgp = Get-Content tunsafe_wg_plugin.cpp -Raw
          if ($wgp -notmatch 'CreateTunsafePlugin[^;]+\{') {
            $lines = (
              '#include "stdafx.h"',
              '#include "tunsafe_wg_plugin.h"',
              '#include "wireguard.h"',
              'TunsafePlugin *CreateTunsafePlugin(PluginDelegate *del, WireguardProcessor *wgp) { return nullptr; }'
            )
            $lines | Set-Content tunsafe_wg_plugin_stub.cpp -Encoding UTF8
            $vcx = Get-Content TunSafe.vcxproj -Raw
            $vcx = $vcx -replace '(<ClCompile Include="tunsafe_wg_plugin\.cpp" />)', '$1<ClCompile Include="tunsafe_wg_plugin_stub.cpp" />'
            $vcx | Set-Content TunSafe.vcxproj -Encoding UTF8
          }
      - name: Patch network_win32.h (replace TcpSocket* classes with include after NetworkWin32)
        shell: pwsh
        run: |
          # network_win32_tcp.h содержит наши расширенные TcpSocketWin32 и TcpSocketQueue
          # (с deferred_close_at_, SetSni и fake TLS поддержкой).
          # Оригинальный network_win32.h содержит старые версии этих классов.
          # 
          # Правило: #include "network_win32_tcp.h" должен стоять ПОСЛЕ определения
          # class NetworkWin32 { }; чтобы избежать цикличных зависимостей.
          # network_win32_tcp.h делает только forward decl NetworkWin32 (не полное определение).

          $h = Get-Content network_win32.h -Raw

          if ($h -match '#include "network_win32_tcp\.h"') {
            Write-Host "network_win32.h already patched"
          } else {
            # Используем счётчик скобок для точного удаления class TcpSocketWin32 { ... };
            function Remove-ClassDef($text, $className) {
              $start = $text.IndexOf("class $className")
              if ($start -lt 0) { return $text }
              $braceStart = $text.IndexOf('{', $start)
              if ($braceStart -lt 0) { return $text }
              $depth = 0; $i = $braceStart
              while ($i -lt $text.Length) {
                if ($text[$i] -eq '{') { $depth++ }
                elseif ($text[$i] -eq '}') {
                  $depth--
                  if ($depth -eq 0) {
                    $end = $text.IndexOf(';', $i)
                    if ($end -lt 0) { break }
                    $end++
                    # Поглощаем пустые строки после };
                    while ($end -lt $text.Length -and $text[$end] -in @("`r", "`n", " ", "`t")) { $end++ }
                    return $text.Substring(0, $start) + $text.Substring($end)
                  }
                }
                $i++
              }
              return $text
            }

            # Удаляем старые классы из network_win32.h
            $h = Remove-ClassDef $h 'TcpSocketWin32'
            $h = Remove-ClassDef $h 'TcpSocketQueue'

            # Вставляем #include ПОСЛЕ закрывающего }; класса NetworkWin32.
            # Ищем конец класса NetworkWin32 через счётчик скобок.
            $start = $h.IndexOf('class NetworkWin32 {')
            if ($start -ge 0) {
              $depth = 0; $i = $h.IndexOf('{', $start)
              while ($i -lt $h.Length) {
                if ($h[$i] -eq '{') { $depth++ }
                elseif ($h[$i] -eq '}') {
                  $depth--
                  if ($depth -eq 0) {
                    $end = $h.IndexOf(';', $i) + 1
                    $insertAt = $end
                    $h = $h.Substring(0, $insertAt) + "`n`n// Extended TCP socket classes (DPI evasion)`n#include `"network_win32_tcp.h`"" + $h.Substring($insertAt)
                    break
                  }
                }
                $i++
              }
            }

            $h | Set-Content network_win32.h -Encoding UTF8 -NoNewline
            Write-Host "Patched network_win32.h: removed old TcpSocket classes, added include after NetworkWin32"
          }
          # Verify order: NetworkWin32 должен быть ДО include
          $lines = Get-Content network_win32.h
          $lineNetworkWin32 = ($lines | Select-String 'class NetworkWin32 \{').LineNumber
          $lineInclude      = ($lines | Select-String '#include "network_win32_tcp').LineNumber
          Write-Host "NetworkWin32 class at line: $lineNetworkWin32"
          Write-Host "include network_win32_tcp.h at line: $lineInclude"
          if ($lineNetworkWin32 -lt $lineInclude) {
            Write-Host "OK: include is after NetworkWin32 definition"
          } else {
            Write-Host "ERROR: wrong order!"
            exit 1
          }

      - name: Patch network_win32_tcp.cpp (fix includes)
        shell: pwsh
        run: |
          # network_win32_tcp.cpp должен включать network_win32.h (а не network_win32_tcp.h напрямую)
          # чтобы видеть полное определение NetworkWin32.
          # Также нужны tunsafe_endian.h (ReadLE32) и wireguard_proto.h (MESSAGE_HANDSHAKE_INITIATION).
          $c = Get-Content network_win32_tcp.cpp -Raw

          # Заменяем #include "network_win32_tcp.h" на правильный набор includes
          if ($c -match '#include "network_win32_tcp\.h"') {
            $c = $c -replace '#include "network_win32_tcp\.h"\r?\n', ''
            Write-Host "Removed #include network_win32_tcp.h from network_win32_tcp.cpp"
          }

          # Добавляем нужные includes если их нет
          if ($c -notmatch '#include "tunsafe_endian\.h"') {
            $c = $c -replace '(#include "network_win32\.h")', "`$1`r`n#include `"tunsafe_endian.h`""
            Write-Host "Added tunsafe_endian.h"
          }
          if ($c -notmatch '#include "wireguard_proto\.h"') {
            $c = $c -replace '(#include "tunsafe_endian\.h")', "`$1`r`n#include `"wireguard_proto.h`""
            Write-Host "Added wireguard_proto.h"
          }

          $c | Set-Content network_win32_tcp.cpp -Encoding UTF8 -NoNewline
          Write-Host "network_win32_tcp.cpp first 12 lines:"
          Get-Content network_win32_tcp.cpp | Select-Object -First 12

      - name: Build x64
        run: |
          msbuild TunSafe.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:WindowsTargetPlatformVersion=10.0 `
            /p:PlatformToolset=v143 `
            /m /nologo
      - name: Build Win32
        run: |
          msbuild TunSafe.sln `
            /p:Configuration=Release `
            /p:Platform=Win32 `
            /p:WindowsTargetPlatformVersion=10.0 `
            /p:PlatformToolset=v143 `
            /m /nologo
      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -Force -ItemType Directory dist\x64   | Out-Null
          New-Item -Force -ItemType Directory dist\Win32 | Out-Null
          Get-ChildItem -Recurse -Filter "*.exe" |
            Where-Object { $_.FullName -match 'x64.Release' } |
            ForEach-Object { Copy-Item $_.FullName dist\x64\ -Force }
          Get-ChildItem -Recurse -Filter "*.exe" |
            Where-Object { $_.FullName -match 'Win32.Release' } |
            ForEach-Object { Copy-Item $_.FullName dist\Win32\ -Force }
          dir dist\x64
          dir dist\Win32
      - uses: actions/upload-artifact@v4
        with:
          name: tunsafe-windows-msvc-x64
          path: dist\x64\
      - uses: actions/upload-artifact@v4
        with:
          name: tunsafe-windows-msvc-win32
          path: dist\Win32\

  # ─────────────────────────────────────────────────────────────────
  # Android NDK
  # ─────────────────────────────────────────────────────────────────
  build-android:
    name: Android NDK (${{ matrix.abi }})
    runs-on: ubuntu-latest
    needs: patch-sources
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            api: 21
          - abi: armeabi-v7a
            api: 21
          - abi: x86_64
            api: 21
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: patched-sources

      - name: Setup NDK r26d
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build libnative-lib.so (${{ matrix.abi }})
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p build/android/${{ matrix.abi }}
          cmake \
            -S android \
            -B build/android/${{ matrix.abi }} \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ matrix.api }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_STL=c++_static
          cmake --build build/android/${{ matrix.abi }} --parallel $(nproc)
          mkdir -p build/android/libs/${{ matrix.abi }}
          cp build/android/${{ matrix.abi }}/libnative-lib.so \
             build/android/libs/${{ matrix.abi }}/libnative-lib.so

      - uses: actions/upload-artifact@v4
        with:
          name: so-${{ matrix.abi }}
          path: build/android/libs/${{ matrix.abi }}/libnative-lib.so

  # ─────────────────────────────────────────────────────────────────
  # Android APK
  # ─────────────────────────────────────────────────────────────────
  assemble-android-apk:
    name: Assemble Android APK
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64-v8a
        uses: actions/download-artifact@v4
        with:
          name: so-arm64-v8a
          path: build/android/libs/arm64-v8a

      - name: Download armeabi-v7a
        uses: actions/download-artifact@v4
        with:
          name: so-armeabi-v7a
          path: build/android/libs/armeabi-v7a

      - name: Download x86_64
        uses: actions/download-artifact@v4
        with:
          name: so-x86_64
          path: build/android/libs/x86_64

      - name: Verify and flatten libs
        run: |
          echo "=== Raw download tree ==="
          find build/android/libs -type f | sort
          echo "==="
          for abi in arm64-v8a armeabi-v7a x86_64; do
            expected="build/android/libs/${abi}/libnative-lib.so"
            if [ ! -f "$expected" ]; then
              found=$(find "build/android/libs/${abi}" -name "libnative-lib.so" | head -1)
              if [ -n "$found" ]; then
                mv "$found" "$expected"
                echo "Flattened: $abi"
              fi
            fi
          done
          find build/android/libs -name "*.so" | sort
          find build/android/libs -name "libnative-lib.so" | grep -q . || { echo "ERROR: no .so files"; exit 1; }

      - name: Install zipalign + apksigner
        run: sudo apt-get update -q && sudo apt-get install -y zipalign apksigner

      - name: Prepare keystore
        id: ks
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > signing.keystore
            echo "file=signing.keystore"                           >> $GITHUB_OUTPUT
            echo "alias=${{ secrets.ANDROID_KEY_ALIAS }}"         >> $GITHUB_OUTPUT
            echo "storepass=${{ secrets.ANDROID_KEYSTORE_PASS }}" >> $GITHUB_OUTPUT
            echo "keypass=${{ secrets.ANDROID_KEY_PASS }}"        >> $GITHUB_OUTPUT
          else
            keytool -genkeypair -keystore debug.keystore -alias tunsafe \
              -keyalg RSA -keysize 2048 -validity 3650 \
              -storepass debugpass -keypass debugpass \
              -dname "CN=TunSafe Debug,O=Debug,C=US" -noprompt
            echo "file=debug.keystore" >> $GITHUB_OUTPUT
            echo "alias=tunsafe"       >> $GITHUB_OUTPUT
            echo "storepass=debugpass" >> $GITHUB_OUTPUT
            echo "keypass=debugpass"   >> $GITHUB_OUTPUT
          fi

      - name: Check APK
        run: |
          [ -f android/TunSafe-Android.apk ] || {
            echo "::error::android/TunSafe-Android.apk not found"
            exit 1
          }

      - name: Inject .so and sign APK
        run: |
          chmod +x android/inject_so.sh
          VERSION="${GITHUB_REF_NAME:-dev}"
          android/inject_so.sh \
            --apk       android/TunSafe-Android.apk \
            --out       "TunSafe-Android-${VERSION}.apk" \
            --libs      build/android/libs \
            --keystore  ${{ steps.ks.outputs.file }} \
            --key-alias ${{ steps.ks.outputs.alias }} \
            --storepass "${{ steps.ks.outputs.storepass }}" \
            --keypass   "${{ steps.ks.outputs.keypass }}"
          echo "APK_FILE=TunSafe-Android-${VERSION}.apk" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: tunsafe-android-apk
          path: ${{ env.APK_FILE }}

  # ─────────────────────────────────────────────────────────────────
  # Release
  # ─────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs:
      - build-linux-x86_64
      - build-linux-i686
      - build-linux-armv7
      - build-linux-aarch64
      - build-windows-msvc
      - assemble-android-apk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Compress Linux binaries
        run: |
          for f in \
            artifacts/tunsafe-linux-x86_64/tunsafe-linux-x86_64 \
            artifacts/tunsafe-linux-i686/tunsafe-linux-i686 \
            artifacts/tunsafe-linux-armv7/tunsafe-linux-armv7 \
            artifacts/tunsafe-linux-aarch64/tunsafe-linux-aarch64; do
            [ -f "$f" ] && gzip -9 -k "$f" || true
          done

      - name: SHA256 checksums
        run: find artifacts/ -type f | sort | xargs sha256sum | tee SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TunSafe ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          body: |
            ## TunSafe ${{ github.ref_name }}

            > Android APK собран из исходников этого коммита.

            | Платформа | Архитектура | Примечание |
            |-----------|-------------|-----------|
            | Linux | x86_64 | static + ASM |
            | Linux | i686 | static |
            | Linux | ARMv7 | static |
            | Linux | AArch64 | static |
            | Windows | x86_64 | MSVC GUI |
            | Android | arm64-v8a + armeabi-v7a + x86_64 | NDK r26d |

            Проверка целостности: `SHA256SUMS.txt`
          files: |
            artifacts/**/*
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
